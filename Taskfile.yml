# Taskfile.yml — consul-mcp-agents
#
# Quick start:
#   cp tf/scenarios/consul-mcp-gke/terraform.tfvars{.example,}
#   $EDITOR tf/scenarios/consul-mcp-gke/terraform.tfvars
#   export TF_VAR_hcp_client_secret='...'
#   task all
#
# Tools: task, terraform>=1.9, packer>=1.10, gcloud, kubectl, docker, vault, jq, uuidgen.

version: "3"

vars:
  TF_DIR: "{{.TASKFILE_DIR}}/tf/scenarios/consul-mcp-gke"
  TFVARS: "{{.TF_DIR}}/terraform.tfvars"
  PACKER_DIR: "packer"
  TOKEN_FILE: ".bootstrap-token"
  SCRIPTS: "{{.TASKFILE_DIR}}/scripts"
  TVGET: "{{.SCRIPTS}}/tfvars-get.sh"
  TVSET: "{{.SCRIPTS}}/tfvars-set.sh"
  GCP_PROJECT: { sh: "{{.TVGET}} {{.TFVARS}} gcp_project_id 2>/dev/null || echo UNSET" }
  GCP_REGION:  { sh: "{{.TVGET}} {{.TFVARS}} gcp_region 2>/dev/null || echo us-central1" }
  AR_REPO:     { sh: "{{.TVGET}} {{.TFVARS}} artifact_registry_repo 2>/dev/null || echo vault-mcp" }
  IMAGE_REPO: "{{.GCP_REGION}}-docker.pkg.dev/{{.GCP_PROJECT}}/{{.AR_REPO}}/vault-mcp-agents"
  MCP_IMAGE_TAG: { sh: "git rev-parse --short HEAD 2>/dev/null || echo latest" }
  STATE_BUCKET: "{{.GCP_PROJECT}}-consul-mcp-tfstate"
  GCLOUD_LOC: "--project {{.GCP_PROJECT}} --region {{.GCP_REGION}}"

env:
  TF_VAR_consul_bootstrap_token: { sh: "cat {{.TOKEN_FILE}} 2>/dev/null || echo ''" }

tasks:

  default: { desc: "List tasks", cmds: ["task --list"] }

  # === Orchestration =========================================================

  all:
    desc: "Full deploy: network → HCP Vault → PKI → Consul → GKE → MCP agents"
    cmds:
      - task: preflight
      - task: ingress:sync-ip
      - task: token:ensure
      - task: tf:backend:init
      - task: packer:build
      - task: phase1:apply
      - task: phase2:apply
      - task: phase3:apply
      - task: phase4:apply
      - task: summary

  destroy:
    desc: "Destroy all Terraform + Packer resources"
    prompt: "Destroys ALL resources (Terraform + Packer images), incl. the HCP Vault cluster. Continue?"
    cmds: [{ task: tf:destroy }, { task: packer:destroy }]

  summary:
    desc: "Print deployment summary"
    dir: "{{.TF_DIR}}"
    cmds: ["terraform output deployment_summary"]

  smoke:
    desc: "End-to-end smoke test (PASS/FAIL/SKIP)"
    cmds: ["{{.SCRIPTS}}/smoke-test.sh '{{.TF_DIR}}' '{{.GCP_PROJECT}}' '{{.GCP_REGION}}'"]

  preflight:
    desc: "Check tooling + GCP auth"
    cmds: ["{{.SCRIPTS}}/preflight.sh '{{.GCP_PROJECT}}' '{{.GCP_REGION}}'"]

  gcloud:login:
    desc: "Authenticate gcloud + ADC + Docker for Artifact Registry"
    cmds:
      - gcloud auth login
      - gcloud auth application-default login
      - gcloud auth configure-docker {{.GCP_REGION}}-docker.pkg.dev

  # === Inputs ================================================================

  ingress:sync-ip:
    desc: "Sync allowed_ingress_cidrs in tfvars to current public IP"
    dir: "{{.TF_DIR}}"
    cmds:
      - |
        IP=$(curl -fsS --max-time 5 ifconfig.me) || { echo "ERROR: ifconfig.me unreachable" >&2; exit 1; }
        EXISTING=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' \
          <(grep -E '^allowed_ingress_cidrs' terraform.tfvars 2>/dev/null) || true)
        if [ "$IP" = "$EXISTING" ]; then
          echo "Public IP unchanged: $IP/32"
        else
          {{.TVSET}} terraform.tfvars remove allowed_ingress_cidrs
          echo "allowed_ingress_cidrs = [\"$IP/32\"]" >> terraform.tfvars
          echo "Set allowed_ingress_cidrs = [\"$IP/32\"] (was: ${EXISTING:-<none>})"
        fi

  token:ensure:
    desc: "Create a Consul bootstrap token if absent"
    cmds:
      - |
        if [ -s "{{.TOKEN_FILE}}" ]; then
          echo "Bootstrap token exists: $(cat {{.TOKEN_FILE}})"
        else
          uuidgen | tr '[:upper:]' '[:lower:]' > "{{.TOKEN_FILE}}"
          echo "Bootstrap token created: $(cat {{.TOKEN_FILE}}) — back this up!"
        fi

  token:rotate:
    desc: "Generate a new Consul bootstrap token (requires full rebuild)"
    prompt: "Rotating the token requires a Packer rebuild + full re-apply. Continue?"
    cmds:
      - "uuidgen | tr '[:upper:]' '[:lower:]' > {{.TOKEN_FILE}}"
      - echo "New token generated. Run 'task packer:build && task all' to apply."

  # === Terraform =============================================================

  tf:backend:init:
    desc: "Create GCS state bucket if absent and init backend"
    dir: "{{.TF_DIR}}"
    cmds:
      - |
        [ "{{.GCP_PROJECT}}" = "UNSET" ] && { echo "ERROR: gcp_project_id not set in terraform.tfvars" >&2; exit 1; }
        if ! gsutil ls "gs://{{.STATE_BUCKET}}" &>/dev/null; then
          gsutil mb -p {{.GCP_PROJECT}} -l {{.GCP_REGION}} -b on "gs://{{.STATE_BUCKET}}"
          gsutil versioning set on "gs://{{.STATE_BUCKET}}"
        fi
      - terraform init -upgrade -migrate-state -backend-config="bucket={{.STATE_BUCKET}}"

  tf:init:
    desc: "Initialise Terraform providers + backend (bucket must exist)"
    run: once
    dir: "{{.TF_DIR}}"
    cmds: ["terraform init -upgrade -backend-config='bucket={{.STATE_BUCKET}}'"]

  tf:plan:
    desc: "Plan all changes"
    dir: "{{.TF_DIR}}"
    cmds: ["terraform plan"]

  tf:apply:
    desc: "Full apply with Docker rebuild"
    dir: "{{.TF_DIR}}"
    cmds:
      - task: preflight
      - task: tf:ensure-ar
      - task: gke:ensure-ready
        vars: { REQUIRED: "false" }
      - task: docker:build
      - task: docker:push
      - terraform apply -parallelism=20 -auto-approve
      - task: mcp:url

  tf:ensure-ar:
    desc: "Create Artifact Registry repo if missing (targeted apply)"
    internal: true
    dir: "{{.TF_DIR}}"
    deps: [tf:init]
    cmds:
      - |
        if gcloud artifacts repositories describe "{{.AR_REPO}}" {{.GCLOUD_LOC}} &>/dev/null; then
          echo "AR repo '{{.AR_REPO}}' already exists."
        else
          terraform apply -auto-approve -target=google_artifact_registry_repository.mcp
        fi

  tf:destroy:
    desc: "Destroy all Terraform-managed resources"
    dir: "{{.TF_DIR}}"
    cmds:
      - task: preflight
      - "{{.TVSET}} terraform.tfvars set gke_cluster_ready false"
      - task: tf:fix-k8s-identity
      - terraform destroy -auto-approve

  tf:output:
    desc: "Show Terraform outputs"
    dir: "{{.TF_DIR}}"
    cmds: ["terraform output"]

  tf:fix-k8s-identity:
    desc: "Workaround for K8s provider 'Unexpected Identity Change' bug"
    dir: "{{.TF_DIR}}"
    cmds: ["{{.SCRIPTS}}/tf-fix-k8s-identity.sh --cleanup"]

  # === Phased apply ==========================================================

  phase1:apply:
    desc: "Phase 1: Network + HCP Vault + PKI + Vault config + Consul VMs"
    dir: "{{.TF_DIR}}"
    cmds:
      - task: tf:init
      - |
        terraform apply -parallelism=20 -auto-approve \
          -target=module.network -target=module.hcp_vault \
          -target=google_artifact_registry_repository.mcp \
          -target=google_service_account.consul_server \
          -target=google_service_account.vault_gcp_verifier \
          -target=google_service_account_key.vault_gcp_verifier \
          -target=google_project_iam_member.vault_gcp_verifier_key_admin \
          -target=google_service_account_iam_member.consul_server_self \
          -target=google_project_iam_member.consul_server_metadata
      - terraform apply -parallelism=20 -auto-approve -target=module.vault_pki -target=module.vault_config
      - terraform apply -parallelism=10 -auto-approve -target=module.consul
      - echo "Phase 1 complete. Wait 2-3 minutes for Consul to boot."

  phase2:apply:
    desc: "Phase 2: GKE cluster + Consul Helm"
    dir: "{{.TF_DIR}}"
    deps: [tf:init]
    cmds:
      - |
        CLUSTER=$({{.TVGET}} terraform.tfvars gke_cluster_name)
        if gcloud container clusters describe "$CLUSTER" {{.GCLOUD_LOC}} &>/dev/null; then
          echo "GKE cluster '$CLUSTER' already exists; skipping creation."
        else
          terraform apply -parallelism=10 -auto-approve -target=module.gke
        fi
      - task: gke:ensure-ready
        vars: { REQUIRED: "true" }
      - |
        terraform apply -parallelism=10 -auto-approve \
          -target='module.gke.kubernetes_namespace.consul[0]' \
          -target='module.gke.kubernetes_secret.consul_ca_cert[0]' \
          -target='module.gke.kubernetes_secret.consul_bootstrap_token[0]'
      - task: consul:refresh-tls
      - task: consul:bootstrap-acl
      - terraform apply -parallelism=10 -auto-approve -target=module.gke
      - "{{.SCRIPTS}}/wait-acl-init.sh"
      - task: consul:verify-auth-method
      - echo "Phase 2 complete."

  phase3:apply:
    desc: "Phase 3: Vault K8s auth + Docker build/push + MCP agent deployments"
    dir: "{{.TF_DIR}}"
    deps: [tf:init]
    cmds:
      - task: gke:ensure-ready
        vars: { REQUIRED: "true" }
      - task: vault:configure-k8s-auth
      - task: docker:build
      - task: docker:push
      - "{{.SCRIPTS}}/tf-fix-k8s-identity.sh '^module\\.mcp_agents\\[0\\]\\.consul_'"
      - |
        terraform apply -parallelism=10 -auto-approve \
          -target=kubernetes_service_account.vault_reviewer \
          -target=kubernetes_cluster_role_binding.vault_reviewer \
          -target=kubernetes_secret.vault_reviewer_token \
          -target=module.mcp_agents
      - task: mcp:url

  phase4:apply:
    desc: "Phase 4: Final reconcile apply"
    dir: "{{.TF_DIR}}"
    deps: [tf:init]
    cmds: ["terraform apply -parallelism=20 -auto-approve"]

  # === Packer ================================================================

  packer:build:
    desc: "Build Consul-server GCP image with vault-agent"
    dir: "{{.PACKER_DIR}}"
    cmds:
      - task: packer:validate
      - |
        packer build \
          -var "gcp_project_id={{.GCP_PROJECT}}" \
          -var "gcp_region={{.GCP_REGION}}" \
          -var "gcp_zone={{.GCP_REGION}}-a" \
          gcp-almalinux-consul-server.pkr.hcl

  packer:validate:
    desc: "Validate Packer templates"
    dir: "{{.PACKER_DIR}}"
    cmds:
      - packer init gcp-almalinux-consul-server.pkr.hcl
      - packer validate -var "gcp_project_id={{.GCP_PROJECT}}" gcp-almalinux-consul-server.pkr.hcl

  packer:destroy:
    desc: "Delete all GCP images in the consul-server image family"
    vars: { IMAGE_FAMILY: "almalinux-consul-server-vault" }
    cmds:
      - |
        IMAGES=$(gcloud compute images list --project {{.GCP_PROJECT}} --filter="family={{.IMAGE_FAMILY}}" --format="value(name)")
        [ -z "$IMAGES" ] && { echo "No images in family '{{.IMAGE_FAMILY}}'."; exit 0; }
        echo "$IMAGES" | xargs gcloud compute images delete --project {{.GCP_PROJECT}} --quiet

  # === Docker ================================================================

  docker:build:
    desc: "Build the vault-mcp-agents Docker image"
    cmds:
      - |
        docker build --platform linux/amd64 \
          --cache-from "{{.IMAGE_REPO}}:latest" \
          --tag "{{.IMAGE_REPO}}:{{.MCP_IMAGE_TAG}}" \
          --tag "{{.IMAGE_REPO}}:latest" \
          --file docker/Dockerfile \
          --build-arg VAULT_VERSION=1.21.3 \
          --build-arg TTYD_VERSION=1.7.7 .

  docker:push:
    desc: "Push the MCP agent image to Artifact Registry"
    cmds:
      - "gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://{{.GCP_REGION}}-docker.pkg.dev"
      - docker push "{{.IMAGE_REPO}}:{{.MCP_IMAGE_TAG}}"
      - docker push "{{.IMAGE_REPO}}:latest"

  # === Vault =================================================================

  vault:configure-k8s-auth:
    desc: "Configure Vault K8s auth backend (targeted apply)"
    dir: "{{.TF_DIR}}"
    cmds:
      - |
        terraform apply -parallelism=10 -auto-approve \
          -target=module.vault_config \
          -target=kubernetes_service_account.vault_reviewer \
          -target=kubernetes_cluster_role_binding.vault_reviewer \
          -target=kubernetes_secret.vault_reviewer_token

  vault:status:
    desc: "Check Vault cluster status"
    vars:
      VAULT_URL: { sh: "cd '{{.TF_DIR}}' && terraform output -raw vault_public_url 2>/dev/null || echo http://127.0.0.1:8200" }
    cmds: ["vault status -address='{{.VAULT_URL}}'"]

  vault:login:operator:
    desc: "Log in to Vault as operator (alice)"
    env:
      VAULT_ADDR: { sh: "cd '{{.TF_DIR}}' && terraform output -raw vault_public_url 2>/dev/null || echo http://127.0.0.1:8200" }
    cmds: ["vault login -method=userpass username=alice"]

  # === GKE ===================================================================

  gke:ensure-ready:
    desc: "Wait for GKE, set kubeconfig, write private endpoint + gke_cluster_ready=true to tfvars"
    # Default REQUIRED via env var so task-level `vars:` does not shadow callsite
    # overrides (Task 3.x merges env over vars but callsite vars over task vars only
    # for unset keys). Phase tasks pass REQUIRED=true via env or arg explicitly.
    cmds: ["{{.SCRIPTS}}/gke-ensure-ready.sh '{{.TF_DIR}}' '{{.GCP_PROJECT}}' '{{.GCP_REGION}}' '{{.REQUIRED | default \"false\"}}'"]

  gke:nodes:
    desc: "List GKE nodes"
    cmds: ["kubectl get nodes -o wide"]

  # === MCP agents (K8s) ======================================================

  mcp:status:
    desc: "Show MCP agent pod and service status"
    cmds:
      - kubectl get pods -n mcp-agents -o wide
      - kubectl get svc -n mcp-agents

  mcp:url:
    desc: "Print the MCP agent web terminal URL"
    cmds:
      - |
        if ! kubectl get ns mcp-agents &>/dev/null; then
          echo "MCP agents namespace not found yet (Phase 3 not deployed)."
          exit 0
        fi
        IP=$(kubectl get svc mcp-agent -n mcp-agents -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
        if [ -n "$IP" ]; then
          echo "Web terminal: http://$IP/"
          echo "Users: alice (operator), bob (analyst), carol (viewer)"
        else
          echo "LoadBalancer IP not yet assigned. Run: kubectl get svc mcp-agent -n mcp-agents -w"
        fi

  mcp:logs:
    desc: "Tail MCP agent pod logs (all containers)"
    cmds: ["kubectl logs -n mcp-agents -l app.kubernetes.io/name=mcp-agents -f --all-containers=true"]

  mcp:exec:
    desc: "Open a shell in an MCP agent pod"
    cmds: ["kubectl exec -it -n mcp-agents deployment/mcp-agents -c mcp-app -- bash"]

  mcp:restart:
    desc: "Rolling restart of MCP agent pods"
    cmds:
      - kubectl rollout restart deployment/mcp-agent -n mcp-agents
      - kubectl rollout status deployment/mcp-agent -n mcp-agents

  # === Consul ================================================================

  consul:tunnel:
    desc: "Start IAP tunnel to Consul server (8501 → localhost:18501)"
    cmds: ["{{.SCRIPTS}}/consul-iap-tunnel.sh '{{.GCP_PROJECT}}' '{{.GCP_REGION}}'"]

  consul:tunnel-stop:
    desc: "Stop the Consul IAP tunnel"
    cmds:
      - |
        if [ -f /tmp/consul-iap-tunnel.pid ]; then
          kill "$(cat /tmp/consul-iap-tunnel.pid)" 2>/dev/null || true
          rm -f /tmp/consul-iap-tunnel.pid
          echo "Tunnel stopped."
        else
          echo "No tunnel PID file."
        fi

  consul:status:
    desc: "Check Consul cluster health"
    cmds:
      - |
        TOKEN=$(vault kv get -field=token secret/consul/acl-token 2>/dev/null || cat {{.TOKEN_FILE}} 2>/dev/null || true)
        [ -z "$TOKEN" ] && { echo "ERROR: no Consul token in Vault or {{.TOKEN_FILE}}" >&2; exit 1; }
        {{.SCRIPTS}}/consul-ssh.sh "{{.TF_DIR}}" "{{.GCP_PROJECT}}" "{{.GCP_REGION}}" "CONSUL_HTTP_TOKEN=$TOKEN consul members"

  consul:bootstrap-acl:
    desc: "Bootstrap Consul ACLs — updates tfvars and K8s secret (idempotent)"
    cmds: ["{{.SCRIPTS}}/consul-bootstrap-acl.sh '{{.TF_DIR}}' '{{.GCP_PROJECT}}' '{{.GCP_REGION}}' '{{.TOKEN_FILE}}'"]

  consul:verify-auth-method:
    desc: "Verify consul-k8s-component-auth-method exists on the Consul server"
    cmds:
      - |
        TOKEN=$({{.TVGET}} "{{.TFVARS}}" consul_bootstrap_token) || { echo "FAIL: no consul_bootstrap_token in tfvars" >&2; exit 1; }
        OUT=$({{.SCRIPTS}}/consul-ssh.sh "{{.TF_DIR}}" "{{.GCP_PROJECT}}" "{{.GCP_REGION}}" "consul acl auth-method list -token='$TOKEN' 2>&1" || true)
        if echo "$OUT" | grep -q "consul-k8s-component-auth-method"; then
          echo "OK: consul-k8s-component-auth-method exists."
        else
          echo "FAIL: consul-k8s-component-auth-method not found." >&2
          echo "Auth methods present:"; echo "$OUT"
          echo "Run: task consul:helm-clean then re-run task phase2:apply" >&2
          exit 1
        fi

  consul:helm-clean:
    desc: "Uninstall Consul Helm release and delete namespace"
    cmds:
      - "helm uninstall consul -n consul --wait --timeout=5m 2>/dev/null || true"
      - kubectl delete namespace consul --ignore-not-found --wait=true
      - echo "Consul Helm release removed. Re-run task phase2:apply."

  consul:refresh-tls:
    desc: "Re-issue Consul server TLS cert and sync consul-ca-cert K8s secret"
    cmds:
      - |
        SSH="{{.SCRIPTS}}/consul-ssh.sh {{.TF_DIR}} {{.GCP_PROJECT}} {{.GCP_REGION}}"
        $SSH "sudo /usr/local/bin/vault-agent-cert-refresh.sh"
        CA=$($SSH "sudo cat /etc/consul.d/tls/ca-chain.pem")
        [ -z "$CA" ] && { echo "ERROR: empty CA chain from VM" >&2; exit 1; }
        {{.SCRIPTS}}/sync-k8s-secret.sh consul consul-ca-cert tls.crt "$CA" || true

  # === HCP utilities =========================================================

  hcp:list-orphans:
    desc: "List HCP HVNs matching this scenario's random_pet pattern (likely orphans)"
    cmds: ["{{.SCRIPTS}}/hcp-list-orphans.sh '{{.TFVARS}}'"]
