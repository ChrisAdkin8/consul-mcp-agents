# =============================================================================
# config/settings.yaml — bundled default
#
# All agent↔MCP-server traffic flows through the Consul service mesh. The
# agent pod's Envoy sidecar exposes each MCP server as a Consul Connect
# upstream listener on localhost (data:20000, compute:20001). There is no
# stdio/subprocess transport — the agent must run in a pod with a sidecar.
#
# In production, vault-agent renders the authoritative version of this file
# from Vault KV (secret/data/mcp-agents/config) to /vault/secrets/settings.yaml
# at pod startup. The bundled copy is only used when vault-agent is unavailable.
# =============================================================================

vault:
  address: "http://127.0.0.1:8200"
  namespace: ""
  auth_method: "userpass"
  gcp_secrets_mount: "gcp"
  agent_approle_mount: "approle"

gcp:
  project_id: ""
  region: "us-central1"

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0

agents:
  data_agent:
    description: "Handles GCS and BigQuery operations"
    mcp_server: "data_server"
    gcp_impersonated_account: "data-agent-gcp"
  compute_agent:
    description: "Handles GCE instance and infrastructure operations"
    mcp_server: "compute_server"
    gcp_impersonated_account: "compute-agent-gcp"

# Each url is the Consul Connect upstream listener on the agent pod's Envoy
# sidecar (declared via `consul.hashicorp.com/connect-service-upstreams`).
# Envoy terminates the agent-side TLS and dials the destination service's
# sidecar over mTLS through the mesh — auth gated by Consul ServiceIntentions.
mcp_servers:
  data_server:
    url: "http://localhost:20000/sse"
  compute_server:
    url: "http://localhost:20001/sse"
